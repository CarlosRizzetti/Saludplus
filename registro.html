<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaludPlus — Crear cuenta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
  body { background: var(--color-support); }
  .auth-screen-content { justify-content: flex-start; padding-top: var(--sp-6); }
  .field-2col { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4); }
</style>
</head>
<body>

<div class="auth-screen">
  <div class="auth-screen-content" style="max-width: 480px;">

    <a href="login.html" class="back-btn" style="margin-bottom: var(--sp-5);">← Volver a Ingresar</a>

    <div class="card auth-card">
      <h1 style="margin-bottom: var(--sp-1);">Creá tu cuenta</h1>
      <p class="text-muted text-small" style="margin-bottom: var(--sp-6);">Te toma menos de 2 minutos. Después, pedir un turno te toma menos de uno.</p>

      <form>
        <div class="field-2col">
          <div class="field">
            <label for="reg-nombre">Nombre</label>
            <input class="input" type="text" id="reg-nombre" placeholder="María José">
          </div>
          <div class="field">
            <label for="reg-apellido">Apellido</label>
            <input class="input" type="text" id="reg-apellido" placeholder="Pérez">
          </div>
        </div>

        <div class="field">
          <label for="reg-dni">DNI</label>
          <input class="input" type="text" id="reg-dni" placeholder="00.000.000">
        </div>

        <div class="field">
          <label for="reg-email">Email</label>
          <input class="input" type="email" id="reg-email" placeholder="tu@email.com">
        </div>

        <div class="field">
          <label for="reg-tel">Teléfono celular</label>
          <input class="input" type="tel" id="reg-tel" placeholder="11 0000-0000">
          <span class="hint">Te avisaremos por WhatsApp si hay cambios en tu turno.</span>
        </div>

        <div class="field">
          <label for="reg-pass">Contraseña</label>
          <input class="input" type="password" id="reg-pass" placeholder="Mínimo 8 caracteres">
        </div>

        <div class="field">
          <label for="reg-os">Obra social o prepaga (opcional)</label>
          <select class="select" id="reg-os">
            <option>Sin cobertura / Particular</option>
            <option>OSDE</option>
            <option>Swiss Medical</option>
            <option>IOMA</option>
            <option>PAMI</option>
            <option>Otra</option>
          </select>
        </div>

        <label class="checkbox-row" style="margin-bottom: var(--sp-6); align-items: flex-start;">
          <input type="checkbox" id="reg-terms" style="margin-top: 2px;">
          <span>Acepto los <a href="#" style="color: var(--color-primary); font-weight:600;">Términos y condiciones</a> y la <a href="#" style="color: var(--color-primary); font-weight:600;">Política de privacidad</a>.</span>
        </label>

        <a href="home.html" class="btn btn-primary btn-block">Crear cuenta</a>
      </form>
    </div>

    <p class="auth-footer-link">¿Ya tenés cuenta? <a href="login.html">Ingresá</a></p>
  </div>
</div>

</body>
</html>
