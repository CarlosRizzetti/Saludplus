<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaludPlus — Turno Confirmado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>
  .confirmed-wrap { max-width: 480px; margin: 0 auto; padding: var(--sp-7) var(--sp-4); text-align: center; }
  .confirmed-actions { display: flex; flex-direction: column; gap: var(--sp-3); margin-top: var(--sp-6); }
</style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="home.html" class="logo"><span class="logo-mark" aria-hidden="true">+</span>SaludPlus</a>
    <div class="header-actions">
      <a href="home.html" class="icon-btn" aria-label="Cerrar">✕</a>
    </div>
  </div>
</header>

<main class="page-content">
  <div class="confirmed-wrap">

    <span class="confirmation-icon" aria-hidden="true">✓</span>
    <h1 style="margin-bottom: var(--sp-2);">¡Turno confirmado!</h1>
    <p class="text-muted">Te esperamos el jueves 25 de junio a las 10:00 hs con el Dr. Eduardo Fernández.</p>

    <div class="appointment-number">
      <span class="label">Número de turno</span>
      <div class="num">SP-2026-08471</div>
    </div>

    <div class="qr-box" aria-label="Código QR del comprobante" role="img">▦</div>
    <p class="text-small text-muted" style="margin-top: var(--sp-3);">Mostrá este código al llegar a recepción</p>

    <div class="confirmed-actions">
      <button class="btn btn-primary btn-block" type="button">⬇️ Descargar comprobante</button>
      <button class="btn btn-outline btn-block" type="button">🗓️ Agregar al calendario</button>
      <a href="mis-turnos.html" class="btn btn-ghost btn-block">Ver mis turnos</a>
    </div>

  </div>
</main>

</body>
</html>
