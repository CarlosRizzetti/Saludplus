<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaludPlus — Recuperar contraseña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design-system.css">
<style>body { background: var(--color-support); }</style>
</head>
<body>

<div class="auth-screen">
  <div class="auth-screen-content">

    <a href="login.html" class="back-btn" style="margin-bottom: var(--sp-5);">← Volver a Ingresar</a>

    <div class="card auth-card">
      <span class="icon-circle" aria-hidden="true" style="margin-bottom: var(--sp-4);">🔑</span>
      <h1 style="margin-bottom: var(--sp-2);">Recuperar contraseña</h1>
      <p class="text-muted text-small" style="margin-bottom: var(--sp-6);">Ingresá el email con el que te registraste. Te enviaremos un enlace para crear una nueva contraseña.</p>

      <form>
        <div class="field">
          <label for="rec-email">Email</label>
          <input class="input" type="email" id="rec-email" placeholder="tu@email.com" autocomplete="email">
        </div>

        <a href="login.html" class="btn btn-primary btn-block">Enviar enlace</a>
      </form>
    </div>

    <p class="auth-footer-link">¿Recordaste tu contraseña? <a href="login.html">Ingresá</a></p>
  </div>
</div>

</body>
</html>
